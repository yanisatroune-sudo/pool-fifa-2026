<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pool FIFA World Cup 2026 — DRI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
:root {
  --green:   #00C46A;
  --green-d: #008F4D;
  --gold:    #F5C842;
  --dark:    #0D0D0D;
  --card:    #161616;
  --card2:   #1E1E1E;
  --border:  rgba(255,255,255,0.07);
  --text:    #F0F0F0;
  --muted:   #888;
  --red:     #E84545;
  --blue:    #4A9EFF;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── HEADER ── */
.site-header {
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(13,13,13,0.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}
.logo {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 2px;
  color: var(--green);
}
.logo span { color: var(--gold); }
.live-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── LAYOUT ── */
.container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 48px 20px 32px;
  border-bottom: 1px solid var(--border);
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(48px, 10vw, 96px);
  letter-spacing: 4px;
  line-height: 1;
  color: var(--text);
}
.hero h1 span { color: var(--green); }
.hero p { color: var(--muted); margin-top: 10px; font-size: 14px; }
.stats-row {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 28px;
}
.stat { text-align: center; }
.stat-num {
  font-family: var(--font-display);
  font-size: 36px;
  color: var(--gold);
  line-height: 1;
}
.stat-label { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* ── JOIN BANNER ── */
#join-zone { padding: 24px 20px 0; max-width: 900px; margin: 0 auto; }
.join-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.join-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: rgba(0,196,106,0.12);
  border: 1px solid rgba(0,196,106,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.join-text h3 { font-weight: 600; font-size: 15px; }
.join-text p { font-size: 13px; color: var(--muted); margin-top: 2px; }
.join-form { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.join-form input {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0 14px;
  height: 38px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  width: 200px;
  transition: border-color .2s;
}
.join-form input:focus { border-color: var(--green); }
.btn-join {
  height: 38px;
  padding: 0 20px;
  background: var(--green);
  color: #000;
  font-weight: 600;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: background .15s, transform .1s;
}
.btn-join:hover { background: var(--green-d); }
.btn-join:active { transform: scale(.97); }
.user-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px 6px 8px;
  font-size: 13px;
}
.user-dot { width: 10px; height: 10px; border-radius: 50%; }
.btn-ghost {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  padding: 0 12px;
  height: 32px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: border-color .15s, color .15s;
}
.btn-ghost:hover { border-color: var(--muted); color: var(--text); }

/* ── TABS ── */
.tabs-wrapper {
  max-width: 900px; margin: 0 auto;
  padding: 24px 20px 0;
}
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 10px 20px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--green); border-bottom-color: var(--green); }

/* ── SECTIONS ── */
.section { display: none; padding: 24px 0 40px; }
.section.active { display: block; }

/* ── NOTIFICATION ── */
.notif {
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  border: 1px solid;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
.notif-success { background: rgba(0,196,106,.1); color: #00C46A; border-color: rgba(0,196,106,.25); }
.notif-info    { background: rgba(74,158,255,.1); color: #4A9EFF; border-color: rgba(74,158,255,.25); }
.notif-warn    { background: rgba(245,200,66,.1); color: #F5C842; border-color: rgba(245,200,66,.25); }

/* ── MATCH CARDS ── */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.flt {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all .15s;
}
.flt.on { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }

.legend-row {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.leg {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
}
.leg-badge {
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
}
.lb-exact  { background: rgba(0,196,106,.15);   color: var(--green); }
.lb-result { background: rgba(74,158,255,.15);  color: var(--blue); }
.lb-wrong  { background: rgba(232,69,69,.12);   color: var(--red); }
.lb-none   { background: rgba(255,255,255,.06); color: var(--muted); }

.match-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 12px;
  transition: border-color .15s;
}
.match-card:hover { border-color: rgba(255,255,255,0.14); }
.match-card.live { border-color: rgba(0,196,106,.35); }
.match-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.phase-badge {
  font-size: 11px; font-weight: 600;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  color: var(--muted);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.match-meta { font-size: 12px; color: var(--muted); }
.live-badge {
  font-size: 11px; font-weight: 700;
  background: rgba(0,196,106,.18);
  color: var(--green);
  border: 1px solid rgba(0,196,106,.3);
  border-radius: 4px;
  padding: 2px 8px;
  animation: pulse 2s infinite;
}
.teams-row {
  display: grid;
  grid-template-columns: 1fr 80px 1fr;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.team { text-align: center; }
.flag { font-size: 32px; display: block; margin-bottom: 4px; }
.team-name { font-size: 13px; font-weight: 600; }
.score-center { text-align: center; }
.score-display {
  font-family: var(--font-display);
  font-size: 30px;
  letter-spacing: 2px;
  color: var(--gold);
}
.vs-text { font-size: 13px; color: var(--muted); font-weight: 500; }

/* My prediction */
.my-pred {
  background: var(--card2);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.my-pred label { font-size: 13px; color: var(--muted); flex: 1; min-width: 100px; }
.score-inp { display: flex; align-items: center; gap: 6px; }
.score-inp input {
  width: 42px; height: 36px;
  text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 16px; font-weight: 700;
  font-family: var(--font-display);
  letter-spacing: 1px;
  outline: none;
  transition: border-color .2s;
}
.score-inp input:focus { border-color: var(--green); }
.score-inp input:disabled { opacity: .5; cursor: not-allowed; }
.score-sep { color: var(--muted); font-size: 16px; font-weight: 500; }
.pts-chip {
  font-size: 12px; font-weight: 700;
  padding: 3px 10px; border-radius: 5px;
}
.pc-exact  { background: rgba(0,196,106,.15);   color: var(--green); }
.pc-result { background: rgba(74,158,255,.15);  color: var(--blue); }
.pc-wrong  { background: rgba(232,69,69,.12);   color: var(--red); }
.pc-none   { background: rgba(255,255,255,.06); color: var(--muted); }

/* Other predictions */
.others-section { margin-top: 8px; }
.others-label {
  font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 6px;
}
.pred-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.pred-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 5px;
  font-size: 12px; border: 1px solid var(--border);
  background: var(--card2);
  color: var(--muted);
}
.pred-chip.exact  { background: rgba(0,196,106,.12);  color: var(--green); border-color: rgba(0,196,106,.25); }
.pred-chip.result { background: rgba(74,158,255,.12); color: var(--blue);  border-color: rgba(74,158,255,.25); }
.pred-chip.wrong  { background: rgba(232,69,69,.1);   color: var(--red);   border-color: rgba(232,69,69,.2); }

/* Result row (admin) */
.result-row {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.result-row label { font-size: 12px; color: var(--muted); flex: 1; }
.result-row .auto-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  background: rgba(0,196,106,.12); color: var(--green);
}

/* ── CLASSEMENT ── */
.podium-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.podium-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.podium-card.p1 { border-color: rgba(245,200,66,.35); }
.podium-card.p2 { border-color: rgba(192,192,192,.25); }
.podium-card.p3 { border-color: rgba(205,127,50,.25); }
.podium-medal { font-size: 28px; margin-bottom: 6px; }
.podium-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  margin: 0 auto 8px;
}
.podium-name { font-weight: 600; font-size: 15px; }
.podium-pts {
  font-family: var(--font-display);
  font-size: 32px; color: var(--gold); line-height: 1; margin-top: 4px;
}
.podium-pts span { font-family: var(--font-body); font-size: 12px; color: var(--muted); }

.stand-list { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.stand-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.stand-row:last-child { border-bottom: none; }
.stand-row:hover { background: var(--card2); }
.stand-row.me { background: rgba(0,196,106,.06); }
.rank-no { font-size: 13px; font-weight: 600; color: var(--muted); min-width: 22px; }
.stand-av {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.stand-name { flex: 1; font-size: 14px; font-weight: 500; }
.you-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: rgba(0,196,106,.15); color: var(--green);
  margin-left: 6px; vertical-align: middle;
}
.stand-detail { font-size: 11px; color: var(--muted); display: flex; gap: 8px; margin-top: 2px; }
.stand-pts { font-family: var(--font-display); font-size: 22px; color: var(--gold); }
.bar-wrap { height: 3px; background: rgba(255,255,255,.06); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; background: var(--gold); transition: width .4s ease; }

/* ── ADMIN ── */
.admin-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
}
.admin-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
.form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.inp {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0 12px;
  height: 38px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  flex: 1;
  min-width: 120px;
  transition: border-color .2s;
}
.inp:focus { border-color: var(--green); }
.inp::placeholder { color: var(--muted); }
.btn-prim {
  height: 38px; padding: 0 18px;
  background: var(--green); color: #000;
  font-weight: 600; font-size: 13px;
  border: none; border-radius: 8px;
  cursor: pointer; font-family: var(--font-body);
  transition: background .15s;
  white-space: nowrap;
}
.btn-prim:hover { background: var(--green-d); }
.admin-list-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.admin-list-item:last-child { border-bottom: none; }
.btn-del {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 14px; padding: 0 4px;
  transition: color .15s;
}
.btn-del:hover { color: var(--red); }
.api-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--card2); border-radius: 8px;
  font-size: 13px; margin-bottom: 10px;
}
.api-ok   { color: var(--green); }
.api-warn { color: var(--gold); }
.api-err  { color: var(--red); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

/* ── BILAN ── */
.bilan-search-wrap { max-width: 420px; margin: 0 auto 24px; position: relative; }
.bilan-search-wrap input {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card2);
  color: var(--text); font-size: 14px; outline: none; font-family: var(--font-body);
}
.bilan-search-wrap input:focus { border-color: var(--green); }
.bilan-suggestions {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; margin-top: 6px; overflow-y: auto; max-height: 220px; z-index: 10;
  display: none;
}
.bilan-suggestions.show { display: block; }
.bilan-suggestions div { padding: 9px 16px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; }
.bilan-suggestions div span { color: var(--muted); font-size: 11px; }
.bilan-suggestions div:hover { background: var(--card); }
.bilan-hint { text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; }

.bilan-card {
  max-width: 420px; margin: 0 auto; background: var(--card);
  border: 1px solid var(--border); border-radius: 16px; padding: 24px;
}
.bilan-name { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 4px; }
.bilan-fun-emoji { font-size: 32px; display: block; text-align: center; margin-bottom: 4px; }
.bilan-fun-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; text-align: center; color: var(--gold); }
.bilan-fun-sub { font-size: 12.5px; color: var(--muted); text-align: center; font-style: italic; margin: 6px 0 18px; }
.bilan-rank-box {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: rgba(245,200,66,.08); border: 1px solid rgba(245,200,66,.2);
  border-radius: 10px; padding: 12px; margin-bottom: 12px;
}
.bilan-total-box {
  display: flex; flex-direction: column; align-items: center;
  background: rgba(0,196,106,.08); border: 1px solid rgba(0,196,106,.2);
  border-radius: 10px; padding: 16px; margin-bottom: 12px;
}
.bilan-total-box .val { font-family: var(--font-display); font-size: 40px; color: var(--green); line-height: 1; }
.bilan-total-box .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.bilan-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.bilan-stat { background: var(--card2); border-radius: 8px; padding: 10px 12px; }
.bilan-stat .lbl { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.bilan-stat .v { font-size: 13px; font-weight: 600; }
.bilan-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.bilan-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; }
.bb-gold  { background: rgba(245,200,66,.12); color: var(--gold); }
.bb-green { background: rgba(0,196,106,.12); color: var(--green); }
.bb-blue  { background: rgba(74,158,255,.12); color: var(--blue); }
.bb-muted { background: rgba(255,255,255,.06); color: var(--muted); }

.bilan-thanks {
  max-width: 560px; margin: 0 auto 28px; text-align: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 22px;
}
.bilan-thanks p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.5; }
.bilan-trophy-wrap { position: relative; text-align: center; margin-bottom: -10px; }
.bilan-trophy-wrap img {
  height: 76px; filter: drop-shadow(0 6px 14px rgba(245,200,66,.4));
  animation: bilan-float 3.2s ease-in-out infinite;
}
@keyframes bilan-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.bilan-sparkle { position:absolute; font-size:14px; opacity:.85; animation: bilan-sparkle 2.4s ease-in-out infinite; }
@keyframes bilan-sparkle { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }
.bilan-podium-row { display:flex; align-items:flex-end; justify-content:center; gap:12px; margin: 8px 0 24px; flex-wrap: wrap; }
.bilan-share-btn {
  width:100%; margin-top:14px; padding:10px; border-radius:10px; border:none;
  background:#464EB8; color:#fff; font-weight:600; font-size:13px;
  cursor:pointer; font-family: var(--font-body);
}
.bilan-share-btn:hover { background:#5A63D6; }

/* ── FOOTER ── */
footer {
  text-align: center; padding: 24px;
  font-size: 12px; color: var(--muted);
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">POOL FIFA <span>2026</span></div>
  <div class="live-indicator">
    <div class="live-dot"></div>
    <span id="sync-label">Chargement...</span>
  </div>
</header>

<div class="hero">
  <div class="container">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update, push, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ═══════════════════════════════════════════════
// CONFIGURATION — Remplace par tes vraies valeurs
// ═══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyC3lgixGNtpxrGPIFfpUDKjvGrkPiTcT1k",
  authDomain:        "pool-wc-2026-dri.firebaseapp.com",
  databaseURL:       "https://pool-wc-2026-dri-default-rtdb.firebaseio.com",
  projectId:         "pool-wc-2026-dri",
  storageBucket:     "pool-wc-2026-dri.firebasestorage.app",
  messagingSenderId: "545092982794",
  appId:             "1:545092982794:web:26d56c7daef7f1a626a7f3"
};
// ═══════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
window.__firebaseDb = db; // expose pour le script admin

const ADMIN_CODE = "dri2026";
const COLORS = [
  "#00C46A","#4A9EFF","#F5C842","#E84545","#A78BFA",
  "#FB923C","#34D399","#F472B6","#60A5FA","#FBBF24"
];

let ME = null;
let isAdmin = false;
let DATA = { participants:{}, matches:{}, predictions:{} };
let currentTab = "classement";
let currentFilter = "all";

// ── Utils ──
function calcPts(ps1, ps2, rs1, rs2) {
  const p1=parseInt(ps1),p2=parseInt(ps2),r1=parseInt(rs1),r2=parseInt(rs2);
  if([p1,p2,r1,r2].some(isNaN)) return null;
  if(p1===r1 && p2===r2) return 3;
  const pw = p1>p2?1:p1<p2?-1:0, rw = r1>r2?1:r1<r2?-1:0;
  return pw===rw ? 1 : 0;
}
function getTotal(pid) {
  const matchPts = Object.values(DATA.matches).reduce((s,m) => {
    const pred = (DATA.predictions||{})[`${pid}_${m.id}`];
    if(!pred || !m.result) return s;
    return s + (calcPts(pred.s1,pred.s2,m.result.s1,m.result.s2)||0);
  }, 0);
  // +5 pts bonus si champion correct
  const champPick = (DATA.champions||{})[pid];
  const champResult = DATA.championResult || null;
  const champBonus = (champPick && champResult && champPick.toLowerCase()===champResult.toLowerCase()) ? 5 : 0;
  return matchPts + champBonus;
}
function getMyPredCount(pid) {
  const total = Object.values(DATA.matches).length;
  const done = Object.values(DATA.matches).filter(m => {
    const pred = (DATA.predictions||{})[`${pid}_${m.id}`];
    return pred && pred.s1 !== "" && pred.s2 !== "";
  }).length;
  return {done, total};
}
function notify(msg, type="info") {
  const z = document.getElementById("notif-zone");
  const d = document.createElement("div");
  d.className = `notif notif-${type}`;
  d.textContent = msg;
  z.innerHTML = "";
  z.appendChild(d);
  setTimeout(()=>d.remove(), 3500);
}
function fmt(ms) {
  return new Date(ms).toLocaleDateString("fr-CA",{weekday:"short",day:"numeric",month:"short"});
}
function pFlag(p) {
  return `<div class="user-dot" style="background:${p.color};width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0"></div>`;
}

// ── Firebase listeners ──
function initListeners() {
  onValue(ref(db,"participants"), snap => {
    DATA.participants = snap.val() || {};
    refreshUI();
  });
  onValue(ref(db,"matches"), snap => {
    DATA.matches = snap.val() || {};
    refreshUI();
  });
  onValue(ref(db,"predictions"), snap => {
    DATA.predictions = snap.val() || {};
    refreshUI();
  });
  onValue(ref(db,"champions"), snap => {
    DATA.champions = snap.val() || {};
    refreshUI();
  });
  onValue(ref(db,"championResult"), snap => {
    DATA.championResult = snap.val() || null;
    refreshUI();
  });
  document.getElementById("sync-label").textContent =
    "En direct · " + new Date().toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"});
  setInterval(()=>{
    document.getElementById("sync-label").textContent =
      "En direct · " + new Date().toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"});
  }, 30000);
}

function refreshUI() {
  updateStats();
  if(currentTab==="classement") renderClassement();
  if(currentTab==="bilan")      renderBilan();
}

// ── Stats ──
function updateStats() {
  const ps = Object.values(DATA.participants).length;
  document.getElementById("s-participants").textContent = ps;
}

// ── Join zone ──
function renderJoinZone() {
  const z = document.getElementById("join-zone");
  const participants = Object.values(DATA.participants);
  if(ME) {
    const p = participants.find(x=>x.id===ME);
    if(!p) { ME=null; renderJoinZone(); return; }
    const {done, total} = getMyPredCount(ME);
    const pct = total ? Math.round(done/total*100) : 0;
    const champPick = (DATA.champions||{})[ME];
    const champLocked = Date.now() > CHAMPION_DEADLINE || (DATA.championResult !== null && DATA.championResult !== undefined);
    const champDeadlinePassed = Date.now() > CHAMPION_DEADLINE;
    const champBonus = champPick && DATA.championResult && champPick.toLowerCase()===DATA.championResult.toLowerCase();
    const borderCol = champBonus ? "rgba(0,196,106,.4)" : "var(--border)";
    let champContent = "";
    if(champPick) {
      champContent = "<div style='display:flex;align-items:center;gap:10px;flex-wrap:wrap'>"
        + "<span style='font-size:14px;color:var(--text)'>Tu as choisi : <strong>" + champPick + "</strong></span>"
        + (champBonus ? "<span style='font-size:12px;padding:2px 8px;border-radius:4px;background:rgba(0,196,106,.15);color:var(--green)'>+5 pts</span>" : "")
        + (!champLocked ? "<button onclick='clearChampion()' style='background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);margin-left:auto'>Changer</button>" : "")
        + "</div>";
    } else if(champLocked) {
      champContent = "<span style='font-size:13px;color:var(--muted)'>Aucune prediction de champion.</span>";
    } else {
      champContent = "<div style='display:flex;gap:8px;flex-wrap:wrap'>"
        + "<input id='champ-inp' placeholder='Ex: France' style='flex:1;min-width:140px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:0 12px;height:36px;color:var(--text);font-size:14px;outline:none' onkeydown='if(event.key===\'Enter\')saveChampion()' />"
        + "<button class='btn-join' onclick='saveChampion()' style='height:36px;padding:0 14px;font-size:13px'>Confirmer</button>"
        + "</div>";
    }
    const deadlineHtml = !champLocked ? "<div style='font-size:11px;color:var(--muted);margin-bottom:10px'>Ferme le 27 juin 23h59 — fin phase de groupes</div>" : "";
    const champHtml = "<div style='background:var(--card);border:1px solid " + borderCol + ";border-radius:12px;padding:14px 18px;margin-top:12px'>"
      + "<div style='font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px'>Champion — +5 pts bonus</div>"
      + deadlineHtml + champContent + "</div>";
    z.innerHTML = `<div class="container" style="padding-top:16px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="user-pill">
          <div style="width:10px;height:10px;border-radius:50%;background:${p.color}"></div>
          ${p.name}
        </div>
        ${isAdmin?`<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(245,200,66,.15);color:#F5C842">Admin</span>`:""}
        <button class="btn-ghost" onclick="logout()" style="margin-left:auto">Changer de joueur</button>
      </div>
      <div style="margin-top:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:13px;color:var(--muted)">Tes prédictions</span>
          <span style="font-size:13px;font-weight:600;color:${pct===100?'var(--green)':'var(--text)'}">${done}/${total} matchs</span>
        </div>
        <div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':'var(--gold)'};border-radius:3px;transition:width .4s"></div>
        </div>
        ${pct<100?`<div style="font-size:12px;color:var(--muted);margin-top:6px">⚡ Il te reste <strong style="color:var(--text)">${total-done} match${total-done>1?'s':''}</strong> à prédire avant le coup d'envoi !</div>`:`<div style="font-size:12px;color:var(--green);margin-top:6px">✓ Toutes tes prédictions sont complètes !</div>`}
      </div>
      ${champHtml}
    </div>`;
  } else {
    z.innerHTML = `<div class="container" style="padding-top:16px">
      <div class="join-card">
        <div class="join-icon">⚽</div>
        <div class="join-text" style="flex:1">
          <h3>Rejoindre le pool</h3>
          <p>${participants.length} participant${participants.length!==1?"s":""} inscrit${participants.length!==1?"s":""}</p>
          <div class="join-form">
            <input id="inp-prenom" placeholder="Prénom" maxlength="24"
              onkeydown="if(event.key==='Enter')joinPool()" style="max-width:140px"/>
            <input id="inp-nom" placeholder="Nom" maxlength="24"
              onkeydown="if(event.key==='Enter')joinPool()" style="max-width:140px"/>
            <button class="btn-join" onclick="joinPool()">Rejoindre →</button>
          </div>
        </div>
      </div>
    </div>`;
  }
}
window.logout = () => { ME=null; renderJoinZone(); renderMatchs(); renderClassement(); };

window.toggleOthers = (mid, btn) => {
  const div = document.getElementById("others-" + mid);
  const icon = document.getElementById("toggle-icon-" + mid);
  if(!div) return;
  const isHidden = div.style.display === "none";
  div.style.display = isHidden ? "flex" : "none";
  div.style.flexWrap = "wrap";
  icon.textContent = isHidden ? "▲ Masquer" : "▼ Voir";
};

const CHAMPION_DEADLINE = new Date("2026-06-28T03:59:00Z").getTime(); // 27 juin 23h59 ET

window.saveChampion = async () => {
  if(!ME) return;
  if(Date.now() > CHAMPION_DEADLINE) {
    notify("🔒 La prédiction du champion est fermée depuis le 27 juin !", "warn");
    return;
  }
  const inp = document.getElementById("champ-inp");
  if(!inp) return;
  const val = inp.value.trim();
  if(!val) return;
  await set(ref(db, `champions/${ME}`), val);
  notify(`Champion choisi : ${val} — +5 pts si correct ! 🏆`, "success");
};

window.clearChampion = async () => {
  if(!ME) return;
  if(Date.now() > CHAMPION_DEADLINE) {
    notify("🔒 La prédiction du champion est fermée depuis le 27 juin !", "warn");
    return;
  }
  await remove(ref(db, `champions/${ME}`));
};

window.saveChampionResult = async () => {
  if(!isAdmin) return;
  const val = document.getElementById("champ-result-inp").value.trim();
  if(!val) return;
  await set(ref(db, "championResult"), val);
  notify(`Champion officiel : ${val} — +5 pts distribués !`, "success");
};

window.joinPool = async () => {
  const prenom = (document.getElementById("inp-prenom")||{value:""}).value.trim();
  const nom = (document.getElementById("inp-nom")||{value:""}).value.trim();
  if(!prenom || !nom) { notify("Entre ton prénom et ton nom !", "warn"); return; }
  const name = prenom + " " + nom;
  const existing = Object.values(DATA.participants).find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(existing) {
    ME = existing.id;
    notify("Bon retour " + prenom + " ! 👋", "success");
  } else {
    const color = COLORS[Object.values(DATA.participants).length % COLORS.length];
    const id = "p_" + Date.now();
    await set(ref(db,`participants/${id}`), { id, name, color, joined: Date.now() });
    ME = id;
    notify("Bienvenue " + prenom + " dans le pool !", "success");
  }
  renderJoinZone();
  renderMatchs();
  renderClassement();
};

// ── Tabs ──
window.showTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) =>
    t.classList.toggle("active", ["classement","bilan"][i]===tab));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  if(tab==="classement") renderClassement();
  if(tab==="bilan")      renderBilan();
};

// ── Matchs ──
window.setFilter = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll(".flt").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  renderMatchs();
};

function renderMatchs() {
  const el = document.getElementById("tab-matchs");
  const all = Object.values(DATA.matches).sort((a,b)=>(b.date||0)-(a.date||0));
  let matches = all;
  if(currentFilter==="pending") matches = all.filter(m=>!m.result);
  if(currentFilter==="done")    matches = all.filter(m=>!!m.result);

  const counts = {
    all: all.length,
    pending: all.filter(m=>!m.result).length,
    done: all.filter(m=>!!m.result).length
  };

  const legend = `<div class="legend-row">
    <div class="leg"><span class="leg-badge lb-exact">+3</span> Score exact</div>
    <div class="leg"><span class="leg-badge lb-result">+1</span> Bon résultat</div>
    <div class="leg"><span class="leg-badge lb-wrong">0</span> Raté</div>
  </div>`;

  const filters = `<div class="filter-row">
    <button class="flt ${currentFilter==="all"?"on":""}" onclick="setFilter('all',this)">Tous (${counts.all})</button>
    <button class="flt ${currentFilter==="pending"?"on":""}" onclick="setFilter('pending',this)">À prédire (${counts.pending})</button>
    <button class="flt ${currentFilter==="done"?"on":""}" onclick="setFilter('done',this)">Terminés (${counts.done})</button>
  </div>`;

  if(!matches.length) {
    el.innerHTML = legend + filters + `<div class="empty">Aucun match dans cette catégorie.</div>`;
    return;
  }

  const cards = matches.map(m => renderMatchCard(m)).join("");
  el.innerHTML = legend + filters + cards;
}

function renderMatchCard(m) {
  const participants = Object.values(DATA.participants);
  const t1parts = m.team1.split(" "), t2parts = m.team2.split(" ");
  const f1=t1parts[0], n1=t1parts.slice(1).join(" ");
  const f2=t2parts[0], n2=t2parts.slice(1).join(" ");
  const kickoffTs = m.kickoff || m.date || 0;
  const dateStr = kickoffTs ? new Date(kickoffTs).toLocaleDateString("fr-CA",{weekday:"short",day:"numeric",month:"short",timeZone:"America/Montreal"}) : "";
  const timeStr = kickoffTs ? new Date(kickoffTs).toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit",timeZone:"America/Montreal"}) : "";

  // Score center
  let scoreHtml;
  if(m.live) {
    scoreHtml = `<div class="score-center">
      <div class="score-display">${m.result?`${m.result.s1}–${m.result.s2}`:"0–0"}</div>
      <div class="live-badge">LIVE</div>
    </div>`;
  } else if(m.result) {
    scoreHtml = `<div class="score-center">
      <div class="score-display">${m.result.s1}–${m.result.s2}</div>
    </div>`;
  } else {
    scoreHtml = `<div class="score-center"><div class="vs-text">VS</div></div>`;
  }

  // My prediction row — bloqué à l'heure du coup d'envoi
  const kickoff = m.kickoff || m.date || 0;
  const isLocked = Date.now() >= kickoff;
  let myPredHtml = "";
  if(ME) {
    const pred = (DATA.predictions||{})[`${ME}_${m.id}`] || {s1:"",s2:""};
    let ptsBadge = "";
    if(m.result && pred.s1!=="" && pred.s2!=="") {
      const pts = calcPts(pred.s1, pred.s2, m.result.s1, m.result.s2);
      if(pts===3) ptsBadge = `<span class="pts-chip pc-exact">+3 pts ✓</span>`;
      else if(pts===1) ptsBadge = `<span class="pts-chip pc-result">+1 pt</span>`;
      else ptsBadge = `<span class="pts-chip pc-wrong">0 pt</span>`;
    }
    const lockBadge = isLocked && !m.result ? `<span class="pts-chip pc-wrong" style="font-size:11px">🔒 Prédictions fermées</span>` : "";
    const disabled = (m.result || isLocked) ? "disabled" : "";
    myPredHtml = `<div class="my-pred">
      <label>Ma prédiction</label>
      ${ptsBadge}${lockBadge}
      <div class="score-inp">
        <input type="number" min="0" max="20" value="${pred.s1}" placeholder="0"
          ${disabled}
          onchange="savePred('${m.id}','s1',this.value)"/>
        <span class="score-sep">–</span>
        <input type="number" min="0" max="20" value="${pred.s2}" placeholder="0"
          ${disabled}
          onchange="savePred('${m.id}','s2',this.value)"/>
      </div>
    </div>`;
  }

  // Others
  const others = participants.filter(p=>p.id!==ME);
  let othersHtml = "";
  if(others.length) {
    const chips = others.map(p => {
      const pred = (DATA.predictions||{})[`${p.id}_${m.id}`];
      if(!pred || pred.s1==="" || pred.s2==="") {
        return `<span class="pred-chip">${pFlag(p)} ${p.name} —</span>`;
      }
      let cls = "";
      if(m.result) {
        const pts = calcPts(pred.s1,pred.s2,m.result.s1,m.result.s2);
        if(pts===3) cls="exact"; else if(pts===1) cls="result"; else cls="wrong";
      }
      return `<span class="pred-chip ${cls}">${pFlag(p)} ${p.name} ${pred.s1}–${pred.s2}</span>`;
    }).join("");
    const othersCount = others.filter(p => {
      const pr = (DATA.predictions||{})[`${p.id}_${m.id}`];
      return pr && pr.s1 !== "" && pr.s2 !== "";
    }).length;
    othersHtml = `<div class="others-section">
      <button onclick="toggleOthers('${m.id}', this)" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0;margin-bottom:0">
        <span class="others-label" style="margin-bottom:0">Prédictions des autres (${othersCount}/${others.length})</span>
        <span style="font-size:11px;color:var(--muted)" id="toggle-icon-${m.id}">▼ Voir</span>
      </button>
      <div class="pred-chips" id="others-${m.id}" style="display:none;margin-top:6px">${chips}</div>
    </div>`;
  }

  // Result row (admin)
  let resultHtml = "";
  if(isAdmin) {
    resultHtml = `<div class="result-row">
      <label>⚡ Résultat réel (admin · ou auto via API)</label>
      <div class="score-inp">
        <input type="number" min="0" max="20" style="width:42px;height:34px;font-size:15px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);text-align:center;outline:none"
          value="${m.result?m.result.s1:""}" placeholder="–"
          onchange="saveResult('${m.id}','s1',this.value)"/>
        <span class="score-sep">–</span>
        <input type="number" min="0" max="20" style="width:42px;height:34px;font-size:15px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);text-align:center;outline:none"
          value="${m.result?m.result.s2:""}" placeholder="–"
          onchange="saveResult('${m.id}','s2',this.value)"/>
      </div>
      ${m.result?`<span class="auto-badge">✓ Sauvegardé</span>`:""}
    </div>`;
  } else if(m.result) {
    resultHtml = `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
      Score final : <strong style="color:var(--text)">${m.result.s1}–${m.result.s2}</strong>
      ${m.autoResult?`<span style="margin-left:8px;font-size:11px;color:var(--green)">· mis à jour automatiquement</span>`:""}
    </div>`;
  }

  return `<div class="match-card${m.live?" live":""}">
    <div class="match-top">
      <span class="phase-badge">${m.group||"Match"}</span>
      <span class="match-meta">${dateStr}${timeStr?" · "+timeStr+" ET":""}</span>
    </div>
    <div class="teams-row">
      <div class="team"><span class="flag">${f1}</span><div class="team-name">${n1}</div></div>
      ${scoreHtml}
      <div class="team"><span class="flag">${f2}</span><div class="team-name">${n2}</div></div>
    </div>
    ${myPredHtml}
    ${othersHtml}
    ${resultHtml}
  </div>`;
}

window.savePred = async (mid, field, val) => {
  if(!ME) { notify("Rejoins le pool d'abord !", "warn"); return; }
  const kickoffTs = (DATA.matches[mid]||{}).kickoff || (DATA.matches[mid]||{}).date || 0;
  if(Date.now() >= kickoffTs) { notify("🔒 Prédictions fermées pour ce match !", "warn"); return; }
  const key = `${ME}_${mid}`;
  const cur = (DATA.predictions||{})[key] || {s1:"",s2:""};
  cur[field] = val;
  await set(ref(db, `predictions/${key}`), cur);
  // Confirmation visuelle sur la carte du match
  const inputs = document.querySelectorAll(`input[onchange*="${mid}"]`);
  inputs.forEach(inp => {
    inp.style.borderColor = "#00C46A";
    setTimeout(() => inp.style.borderColor = "", 2000);
  });
  // Petit badge "✓ Sauvegardé"
  const predRow = inputs[0]?.closest(".my-pred");
  if(predRow) {
    let badge = predRow.querySelector(".save-badge");
    if(!badge) {
      badge = document.createElement("span");
      badge.className = "save-badge";
      badge.style.cssText = "font-size:11px;color:#00C46A;margin-left:4px;transition:opacity .3s";
      predRow.querySelector("label").after(badge);
    }
    badge.textContent = "✓ Sauvegardé";
    badge.style.opacity = "1";
    clearTimeout(badge._t);
    badge._t = setTimeout(() => badge.style.opacity = "0", 2000);
  }
};

window.saveResult = async (mid, field, val) => {
  const m = DATA.matches[mid];
  if(!m) return;
  const result = m.result || {s1:"",s2:""};
  result[field] = val;
  await update(ref(db, `matches/${mid}`), {result, autoResult: false});
};

function renderClassement() {
  const el = document.getElementById("tab-classement");
  const participants = Object.values(DATA.participants);
  if(!participants.length) {
    el.innerHTML = `<div class="empty">Personne n'a encore rejoint le pool.</div>`;
    return;
  }
  const ranked = participants.map(p => {
    const total = getTotal(p.id);
    const exact = Object.values(DATA.matches).filter(m => {
      const pred = (DATA.predictions||{})[`${p.id}_${m.id}`];
      return pred && m.result && calcPts(pred.s1,pred.s2,m.result.s1,m.result.s2)===3;
    }).length;
    const res = Object.values(DATA.matches).filter(m => {
      const pred = (DATA.predictions||{})[`${p.id}_${m.id}`];
      return pred && m.result && calcPts(pred.s1,pred.s2,m.result.s1,m.result.s2)===1;
    }).length;
    const champPick = (DATA.champions||{})[p.id] || null;
    const champBonus = champPick && DATA.championResult && champPick.toLowerCase()===DATA.championResult.toLowerCase();
    return {...p, total, exact, res, champPick, champBonus};
  }).sort((a,b)=>b.total-a.total);

  const maxPts = Math.max(...ranked.map(r=>r.total), 1);
  const medals = ["🥇","🥈","🥉"];

  // Podium top 3
  const podium = ranked.slice(0,3).map((p,i) => `
    <div class="podium-card p${i+1}">
      <div class="podium-medal">${medals[i]}</div>
      <div class="podium-avatar" style="background:${p.color}22;color:${p.color}">${p.name[0].toUpperCase()}</div>
      <div class="podium-name">${p.name}${p.id===ME?`<span class="you-tag">moi</span>`:""}</div>
      <div class="podium-pts">${p.total}<span> pts</span></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${p.exact} exact · ${p.res} résultat</div>
    </div>`).join("");

  // Full list
  const rows = ranked.map((p,i) => `
    <div class="stand-row${p.id===ME?" me":""}">
      <span class="rank-no">${medals[i]||i+1}</span>
      <div class="stand-av" style="background:${p.color}22;color:${p.color}">${p.name[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="stand-name">${p.name}${p.id===ME?`<span class="you-tag">moi</span>`:""}</div>
        <div class="stand-detail">
          <span style="color:var(--green)">${p.exact} exact</span>
          <span style="color:var(--blue)">${p.res} résultat</span>
          ${p.champBonus?`<span style="color:#F5C842">+5 🏆</span>`:(p.champPick?`<span>🏆 ${p.champPick}</span>`:``)}
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(p.total/maxPts*100)}%"></div></div>
      </div>
      <div style="text-align:right">
        <div class="stand-pts">${p.total}</div>
        <div style="font-size:11px;color:var(--muted)">pts</div>
      </div>
    </div>`).join("");

  el.innerHTML = `
    <div class="podium-row">${podium}</div>
    <div class="stand-list">${rows}</div>`;
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return Math.abs(h);}
function pick(arr, seed){ return arr[seed % arr.length]; }

function bilanFunProfile(name, rank, total, exact, resultat, totalP) {
  const pct = Math.max(1, Math.round((rank/totalP)*100));
  const attempts = exact + resultat;
  const exactRatio = attempts>0 ? exact/attempts : 0;
  let bucket;
  if(rank===1) bucket="champion";
  else if(rank<=3) bucket="podium";
  else if(total===0) bucket="ghost";
  else if(exactRatio>=0.4 && exact>=8) bucket="sniper";
  else if(resultat>exact*5 && resultat>=20) bucket="prudent";
  else if(pct<=15) bucket="top15";
  else if(pct>=85) bucket="bottom";
  else if(pct>=60) bucket="lower";
  else bucket="upper";
  const seed = hashStr(name+bucket);
  const chosen = pick(TITLE_BANKS[bucket], seed);
  const badges = [];
  if(exact>=15) badges.push(["Machine à scores exacts","bb-gold"]);
  else if(exact>=10) badges.push(["Bon flair pour le score","bb-gold"]);
  if(resultat>=45) badges.push(["Sens du vainqueur aiguisé","bb-blue"]);
  if(rank<=10) badges.push(["Top 10","bb-green"]);
  if(total>0 && total<10) badges.push(["Petit but, grand cœur","bb-muted"]);
  if(total===0) badges.push(["A tenté sa chance","bb-muted"]);
  return {...chosen, badges: badges.slice(0,3)};
}

window.bilanSearch = (q) => {
  const box = document.getElementById("bilan-suggestions");
  const query = q.trim().toLowerCase();
  if(!query) { box.classList.remove("show"); box.innerHTML=""; return; }
  const matches = bilanRanking.filter(p=>p.name.toLowerCase().includes(query)).slice(0,10);
  if(!matches.length) { box.classList.remove("show"); return; }
  box.innerHTML = matches.map(p=>`<div onclick="selectBilan('${p.name.replace(/'/g,"\\'")}')">
    ${p.name} <span>#${p.rank}</span></div>`).join("");
  box.classList.add("show");
};
window.selectBilan = (name) => {
  document.getElementById("bilan-search").value = name;
  document.getElementById("bilan-suggestions").classList.remove("show");
  renderBilanCard(name);
};

function renderBilanCard(name) {
  const p = bilanRanking.find(r=>r.name===name);
  const zone = document.getElementById("bilan-card-zone");
  if(!p) { zone.innerHTML = ""; return; }
  const fp = bilanFunProfile(p.name, p.rank, p.total, p.exact, p.resultat, bilanRanking.length);
  zone.innerHTML = `
    <div class="bilan-card">
      <div class="bilan-name">${p.name}${p.id===ME?` <span class="you-tag">moi</span>`:""}</div>
      <span class="bilan-fun-emoji">${fp.emoji}</span>
      <div class="bilan-fun-title">${fp.title}</div>
      <div class="bilan-fun-sub">"${fp.sub}"</div>
      <div class="bilan-rank-box">
        <div>
          <div style="font-size:12px;color:var(--muted)">Classement final</div>
          <div style="font-size:18px;font-weight:700;color:var(--gold)">${p.rank===1?"1er":p.rank+"e"} <span style="font-size:12px;font-weight:400;color:var(--muted)">sur ${bilanRanking.length}</span></div>
        </div>
      </div>
      <div class="bilan-total-box">
        <div style="font-size:12px;color:var(--muted)">Total de points</div>
        <div class="val">${p.total}</div>
        <div class="sub">${p.exact} scores exacts · ${p.resultat} bons résultats</div>
      </div>
      <div class="bilan-badges">${fp.badges.map(([l,c])=>`<span class="bilan-badge ${c}">${l}</span>`).join("")}</div>
      <button class="bilan-share-btn" onclick="shareBilanTeams('${p.name.replace(/'/g,"\\'")}', ${p.total}, ${p.rank}, '${fp.emoji}', '${fp.title.replace(/'/g,"\\'")}')">📤 Partager sur Teams</button>
    </div>`;
  if(window.confetti) {
    confetti({ particleCount: 60, spread: 70, origin:{y:.4}, colors:["#F5C842","#00C46A","#4A9EFF"] });
  }
}

window.shareBilanTeams = (name, total, rank, emoji, title) => {
  const pageUrl = window.location.href;
  const message = `${emoji} ${title} — ${name} termine #${rank} avec ${total} points au pool FIFA 2026 !`;
  const teamsUrl = `https://teams.microsoft.com/share?href=${encodeURIComponent(pageUrl)}&msgText=${encodeURIComponent(message)}`;
  window.open(teamsUrl, "_blank");
};
window.checkAdmin = () => {
  const v = document.getElementById("admin-code").value;
  if(v===ADMIN_CODE) {
    isAdmin=true;
    notify("Accès admin activé ✓","success");
    renderAdmin();
    renderMatchs();
  } else {
    notify("Code incorrect","warn");
  }
};

function renderAdmin() {
  const el = document.getElementById("tab-admin");
  const participants = Object.values(DATA.participants);
  const matches = Object.values(DATA.matches).sort((a,b)=>(a.date||0)-(b.date||0));

  if(!isAdmin) {
    el.innerHTML = `<div class="admin-card" style="max-width:400px">
      <h3>🔒 Accès administrateur</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Entre le code admin pour gérer les matchs et activer la synchro des scores.</p>
      <div class="form-row">
        <input class="inp" id="admin-code" type="password" placeholder="Code admin"
          onkeydown="if(event.key==='Enter')checkAdmin()"/>
        <button class="btn-prim" onclick="checkAdmin()">Connexion</button>
      </div>
    </div>`;
    return;
  }

  const pList = participants.map(p=>`
    <div class="admin-list-item">
      <div style="width:10px;height:10px;border-radius:50%;background:${p.color}"></div>
      <span style="flex:1">${p.name}</span>
      <span style="font-size:11px;color:var(--muted)">${getTotal(p.id)} pts</span>
      <button class="btn-del" onclick="removeP('${p.id}')">✕</button>
    </div>`).join("") || `<div style="font-size:13px;color:var(--muted);padding:8px 0">Aucun participant</div>`;

  const mList = matches.map(m=>`
    <div class="admin-list-item">
      <span style="flex:1;font-size:13px">${m.team1} vs ${m.team2}
        <span style="color:var(--muted);font-size:11px"> · ${m.group||""}</span>
      </span>
      ${m.result?`<span style="font-size:12px;color:var(--green)">${m.result.s1}–${m.result.s2}</span>`:""}
      ${m.autoResult?`<span style="font-size:10px;color:var(--green);margin-left:4px">auto</span>`:""}
      <button class="btn-del" onclick="removeM('${m.id}')">✕</button>
    </div>`).join("") || `<div style="font-size:13px;color:var(--muted);padding:8px 0">Aucun match ajouté</div>`;

  el.innerHTML = `
    <div class="admin-card">
      <h3>⚡ Synchro automatique des scores</h3>
      <div class="api-status api-ok" id="api-status-box">
        ● Configuration requise — voir instructions ci-dessous
      </div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px">
        Les scores sont mis à jour automatiquement via <strong style="color:var(--text)">football-data.org</strong>
        toutes les 2 minutes. La clé API gratuite est configurée dans la fonction Vercel/Firebase.
      </p>
      <button class="btn-prim" onclick="triggerSync()" id="btn-sync">🔄 Forcer une synchro maintenant</button>
    </div>

    <div class="admin-card">
      <h3>🏆 Champion officiel (résultat final)</h3>
      ${DATA.championResult
        ? `<div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:14px;color:var(--text)">Champion : <strong style="color:var(--green)">${DATA.championResult}</strong></span>
            <span style="font-size:12px;color:var(--muted)">+5 pts distribués aux bons pronostiqueurs</span>
          </div>`
        : `<div style="font-size:13px;color:var(--muted);margin-bottom:10px">À saisir après la finale du 19 juillet.</div>
           <div style="display:flex;gap:8px">
             <input class="inp" id="champ-result-inp" placeholder="Ex: 🇫🇷 France"/>
             <button class="btn-prim" onclick="saveChampionResult()">Confirmer</button>
           </div>`
      }
    </div>

    <div class="admin-card">
      <h3>➕ Ajouter un match</h3>
      <div class="form-row">
        <input class="inp" id="at1" placeholder="🇫🇷 France"/>
        <input class="inp" id="at2" placeholder="🇧🇷 Brésil"/>
      </div>
      <div class="form-row">
        <input class="inp" id="adate" type="date"/>
        <input class="inp" id="atime" type="time" value="15:00" style="max-width:120px"/>
        <input class="inp" id="agrp" placeholder="Groupe A / Huitième..."/>
      </div>
      <button class="btn-prim" onclick="addMatch()">Ajouter le match</button>
      <p style="font-size:11px;color:var(--muted);margin-top:8px">
        L'ID API est l'identifiant du match sur football-data.org — permet la synchro auto des scores.
      </p>
    </div>

    <div class="admin-card">
      <h3>👥 Participants (${participants.length})</h3>
      ${pList}
    </div>

    <div class="admin-card">
      <h3>📅 Matchs (${matches.length})</h3>
      ${mList}
    </div>`;
}

window.addMatch = async () => {
  const t1 = document.getElementById("at1").value.trim();
  const t2 = document.getElementById("at2").value.trim();
  if(!t1||!t2) return;
  const id = "m_" + Date.now();
  const dateVal = document.getElementById("adate").value;
  const timeVal = document.getElementById("atime").value || "15:00";
  const kickoff = dateVal ? new Date(dateVal + "T" + timeVal + ":00").getTime() : Date.now();
  await set(ref(db,`matches/${id}`), {
    id, team1:t1, team2:t2,
    date: kickoff,
    kickoff: kickoff,
    group: document.getElementById("agrp").value.trim(),
    result: null, autoResult: false, live: false
  });
  ["at1","at2","adate","atime","agrp"].forEach(fid=>{ const el=document.getElementById(fid); if(el) el.value=""; });
  notify("Match ajouté !", "success");
};

window.removeP = async (id) => {
  await remove(ref(db,`participants/${id}`));
};
window.removeM = async (id) => {
  await remove(ref(db,`matches/${id}`));
};

window.triggerSync = async () => {
  const btn = document.getElementById("btn-sync");
  btn.textContent = "⏳ Synchro en cours...";
  btn.disabled = true;
  try {
    // Appelle la fonction Vercel de synchro
    const res = await fetch("/api/sync-scores");
    const data = await res.json();
    notify(`Synchro OK — ${data.updated||0} match(s) mis à jour`, "success");
  } catch(e) {
    notify("Erreur de synchro — vérifie la configuration de l'API", "warn");
  }
  btn.textContent = "🔄 Forcer une synchro maintenant";
  btn.disabled = false;
};

// ── Init ──
initListeners();
</script>
</body>
</html>
